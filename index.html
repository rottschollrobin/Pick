  const rightHtml = `<button class="iconbtn" data-action="switch-user" title="Nutzer wechseln">👤</button>${menuBtn()}`;

  if (!state.meta){
    let statusLine = 'Noch keine Pickliste gefunden.';
    if (!state.sourceUrl) statusLine = 'Es ist noch keine Pickliste-Quelle eingerichtet.';
    else if (state.fetchStatus === 'checking') statusLine = 'Prüfe auf eine aktuelle Pickliste …';
    else if (state.fetchStatus === 'error') statusLine = 'Konnte die Pickliste nicht laden: ' + esc(state.fetchError || '');
    return `
    ${topbarHtml({title:'Pick', sub, rightHtml})}
    <div class="content">
      <div class="empty-state">
        <div class="big">📭</div>
        <div>${statusLine}</div>
        <button class="btn btn-primary" style="margin-top:14px;" data-action="go-settings">Einstellungen öffnen</button>
      </div>
    </div>`;
  }

  const zones = ZONE_ORDER.filter(z => (state.items[z]||[]).length > 0);
  if ((state.items.Sonstige||[]).length > 0) zones.push('Sonstige');

  const tiles = zones.map(z => {
    const def = ZONE_DEFS[z] || {label:'Sonstige', range:'nicht zugeordnet', color:'var(--ink-soft)'};
    const st = zoneStats(z);
    const pct = st.total ? Math.round((st.done/st.total)*100) : 0;
    const isZoneDone = st.total > 0 && st.done === st.total;
    const dmgCount = zoneDamageCount(z);
    const presence = state.presence[z] || {};
    const activeNames = Object.entries(presence).filter(([,p]) => Date.now()-p.at < 1000*60*30).sort((a,b)=>b[1].at-a[1].at);
    return `
    <div class="zone-block">
    <div class="zone-tile" style="--zc:${def.color}" data-action="enter-zone" data-zone="${z}">
      ${isZoneDone ? `<div class="zone-done-badge">✓ Erledigt</div>` : ''}
      <div class="${isZoneDone ? 'zone-tile-dim' : ''}">
        <div class="zone-head">
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="zone-icon-badge">${MENU_ICONS.pick}</div>
            <div><div class="zone-name">${esc(def.label)}</div><div class="faint" style="font-size:0.78rem; margin-top:2px;">${esc(def.range)}</div></div>
          </div>
          <div class="zone-count">${st.open} / ${st.total}</div>
        </div>
      </div>
      <div class="zone-progress-track"><div class="zone-progress-fill" style="width:${pct}%; background:${progressColor(pct)};"></div></div>
      <div class="${isZoneDone ? 'zone-tile-dim' : ''}">
        ${st.open > 0 ? `<div class="zone-boxes">📦 ca. ${boxRecommendation(st.open)} Kiste${boxRecommendation(st.open)===1?'':'n'} empfohlen</div>` : ''}
        ${activeNames.length ? `<div class="zone-presence">${activeNames.map(([n,p]) => `<span class="pill">${esc(n)} · ${esc(p.lagerfach)} · ${timeAgo(p.at)}</span>`).join('')}</div>` : ''}
      </div>
    </div>
    ${renderReportBubbles(z)}
    </div>`;
  }).join('');

  const banner = state.pendingUpdate ? `
    <div class="update-banner">
      <span>📥 Neue Pickliste erkannt (${timeAgo(state.pendingUpdate.fetchedAt)})</span>
      <button class="btn btn-primary btn-sm" data-action="apply-update">Jetzt laden</button>
    </div>` : '';

  return `
  ${topbarHtml({title:'Pick', sub: `${sub} · ${esc(state.meta.totalItems)} Positionen`, rightHtml})}
  <div class="content stack">
    ${banner}
    <div>
      <div class="section-title">Bereich wählen</div>
      <div class="stack">${tiles}</div>
    </div>
  </div>`;
}

function renderItemCard(zone, item, def){
  const st = (state.status[zone] || {})[item.id];
  const presence = state.presence[zone] || {};
  const markers = Object.entries(presence).filter(([n,p]) => p.itemId === item.id && n !== (st && st.by));
  const isDamagedLocked = !!(st && st.damage && !st.picked);
  let stamp = '';
  if (st && st.picked){
    const label = st.notFound ? 'Fehlt · ' + initials(st.by) : 'Erledigt · ' + initials(st.by);
    stamp = `<div class="stamp ${st.notFound ? 'nf' : ''}">${esc(label)}</div>`;
  } else if (isDamagedLocked){
    stamp = `<div class="stamp nf">Gesperrt · ${esc(initials(st.damage.by))}</div>`;
  }
  const coverHtml = coverSlotHtml(zone, item, st && st.photo);
  const editIcons = `
      <button class="icon-sq-btn" data-action="edit-title" data-zone="${zone}" data-id="${esc(item.id)}" title="Titel bearbeiten">✏️</button>
      <button class="icon-sq-btn ${st && st.damage ? 'icon-sq-btn-active' : ''}" data-action="open-damage" data-zone="${zone}" data-id="${esc(item.id)}" title="Schaden melden">⚠️</button>`;
  const actionsHtml = (st && st.picked)
    ? `<div class="icon-row">${editIcons}<button class="undo-btn" style="flex:1;" data-action="undo" data-zone="${zone}" data-id="${esc(item.id)}">Rückgängig</button></div>`
    : isDamagedLocked
    ? `<div class="icon-row">${editIcons}</div><div class="faint center" style="font-size:0.74rem; margin-top:6px;">Gesperrt, bis das Problem gelöst ist</div>`
    : `
      <button class="btn btn-primary btn-sm" data-action="pick" data-zone="${zone}" data-id="${esc(item.id)}">✓ Gepickt</button>
      <button class="pin-btn-stacked" data-action="markhere" data-zone="${zone}" data-id="${esc(item.id)}">📍 Hier starten</button>
      <div class="icon-row">${editIcons}<button class="nf-btn" style="flex:1;" data-action="notfound" data-zone="${zone}" data-id="${esc(item.id)}">Nicht gefunden</button></div>
    `;
  const displayTitle = (st && st.titleOverride) || item.titel;
  const extraInfo = (zone === 'M' && item.titelLang && item.titelLang.trim() !== item.titel.trim())
    ? `<div class="item-subtitle">${esc(item.titelLang)}</div>`
    : '';
  const damageInfo = st && st.damage
    ? `<div class="damage-marker">⚠ ${esc(st.damage.reason)}${st.evidencePhoto ? ' · 📷' : ''}</div><div class="reported-by">gemeldet von ${esc(st.damage.by)}</div>`
    : '';
  return `
  <div class="item ${(st && (st.picked || isDamagedLocked)) ? 'done' : ''}" id="item-${esc(item.id)}" style="--zc:${def.color}">
    ${coverHtml}
    <div class="item-main">
      <div class="item-lf-inline">${esc(item.lagerfach)}</div>
      <div class="item-title">${esc(displayTitle)}${item.menge>1 ? `<span class="qty-badge">×${item.menge}</span>`:''}</div>
      ${extraInfo}
      ${damageInfo}
      <div class="item-meta"><span>Bestellnr. ${esc(item.bestellnummer)}</span></div>
      ${markers.length ? `<div class="marker-row">${markers.map(([n]) => `<span class="marker">📍 ${esc(n)}</span>`).join('')}</div>` : ''}
    </div>
    <div class="item-actions-col">
      ${stamp}
      ${actionsHtml}
    </div>
  </div>`;
}

function lastPickedInfo(zone, itemsSubset){
  const status = state.status[zone] || {};
  let best = null;
  for (const it of itemsSubset){
    const s = status[it.id];
    if (s && s.picked && (!best || s.at > best.s.at)) best = { item: it, s };
  }
  if (!best) return null;
  return { lagerfach: best.item.lagerfach, titel: best.s.titleOverride || best.item.titel };
}

function renderPicking(){
  const zone = state.currentZone;
  const def = ZONE_DEFS[zone] || {label:'Sonstige', range:'', color:'var(--ink-soft)'};
  const assignment = state.assignment[zone] || {};
  const myAssignedIds = new Set(Object.entries(assignment).filter(([,a]) => a.by === state.pickerName).map(([id]) => id));
  const hasPartial = myAssignedIds.size > 0;
  let allItems = state.items[zone] || [];
  if (hasPartial) allItems = allItems.filter(it => myAssignedIds.has(it.id));
  const status = state.status[zone] || {};
  const st = scopedStats(zone, allItems);
  const pct = st.total ? Math.round((st.done/st.total)*100) : 0;
  const visible = allItems.filter(it => {
    const s = status[it.id];
    if (state.pickFilter === 'all') return true;
    if (state.pickFilter === 'notfound') return !!(s && s.notFound);
    if (state.pickFilter === 'problems') return !!(s && s.damage);
    return !(s && (s.picked || s.damage)); // 'open' (Standard)
  });
  const presence = state.presence[zone] || {};
  const lastPick = lastPickedInfo(zone, allItems);
  const outstandingNotFound = allItems.filter(it => status[it.id] && status[it.id].notFound).length;
  const outstandingProblems = allItems.filter(it => status[it.id] && status[it.id].damage).length;
  let emptyMsg;
  if (state.pickFilter === 'open'){
    if (outstandingNotFound > 0 || outstandingProblems > 0){
      const parts = [];
      if (outstandingNotFound > 0) parts.push(`${outstandingNotFound} nicht gefunden`);
      if (outstandingProblems > 0) parts.push(`${outstandingProblems} mit Problem`);
      emptyMsg = { icon: '⚠️', text: `Alle Artikel bearbeitet, aber es gibt noch offene Punkte: ${parts.join(' · ')}.` };
    } else {
      emptyMsg = { icon: '🎉', text: 'Alle Artikel sind gepickt – super gemacht!' };
    }
  } else if (state.pickFilter === 'notfound'){
    emptyMsg = { icon: '👍', text: 'Nichts als "nicht gefunden" gemeldet – alles ist da!' };
  } else if (state.pickFilter === 'problems'){
    emptyMsg = { icon: '✅', text: 'Keine Probleme gemeldet – alle Artikel sind heile!' };
  } else {
    emptyMsg = { icon: '📭', text: 'Keine Artikel in diesem Bereich.' };
  }
  const list = visible.length ? visible.map(it => {
    const here = Object.entries(presence).filter(([,p]) => p.itemId === it.id && Date.now()-p.at < 1000*60*30);
    const divider = here.length ? `<div class="start-divider"><span>Ab hier arbeitet ${here.map(([n]) => esc(n)).join(', ')}</span></div>` : '';
    return divider + renderItemCard(zone, it, def);
  }).join('') : `<div class="empty-state"><div class="big">${emptyMsg.icon}</div>${esc(emptyMsg.text)}</div>`;

  return `
  ${topbarHtml({
    title: def.label,
    sub: `${esc(state.pickerName)} · ${st.done} / ${st.total} erledigt${st.nf ? ' · ' + st.nf + ' nicht gefunden' : ''}${hasPartial ? ' · Teilbereich' : ''}`,
    rightHtml: `<button class="iconbtn" data-action="leave-zone">← Bereiche</button>${menuBtn()}`,
    progressPct: pct, bg: def.color,
    extraHtml: lastPick ? `<div class="topbar-banner"><span class="lp-label">Zuletzt</span><span class="lp-lagerfach">${esc(lastPick.lagerfach)}</span><span class="lp-title">${esc(lastPick.titel)}</span></div>` : '',
  })}
  <div class="content">
    ${hasPartial ? `<button class="btn btn-outline btn-sm" style="margin-bottom:14px;" data-action="request-more-boxes" data-zone="${zone}">+ Mehr Kisten zuteilen</button>` : ''}
    <div class="picking-tools">
      <select id="pick-filter-select" class="url-field" style="max-width:150px; flex-shrink:0;">
        <option value="open" ${state.pickFilter === 'open' ? 'selected' : ''}>Nur offen</option>
        <option value="all" ${state.pickFilter === 'all' ? 'selected' : ''}>Alle</option>
        <option value="notfound" ${state.pickFilter === 'notfound' ? 'selected' : ''}>Nicht gefunden</option>
        <option value="problems" ${state.pickFilter === 'problems' ? 'selected' : ''}>Probleme</option>
      </select>
      <form class="jumpform" data-action="jump-form">
        <input type="text" id="jump-input" placeholder="Sprung zu Lagerfach / Position…" />
        <button class="btn btn-outline btn-sm" type="submit">Los</button>
      </form>
    </div>
    <div class="stack">${list}</div>
  </div>`;
}

function staticCoverHtml(item, photo){
  const coverId = 'cover-' + item.id;
  if (photo) return `<img class="item-cover" id="${coverId}" src="${esc(photo)}" alt="">`;
  if (!item.code) return `<div class="item-cover item-cover-none" id="${coverId}">Kein Bild<br>verfügbar</div>`;
  const cached = coverCache[item.code];
  if (cached === 'NONE') return `<div class="item-cover item-cover-none" id="${coverId}">Kein Bild<br>verfügbar</div>`;
  if (cached) return `<img class="item-cover" id="${coverId}" src="${esc(cached)}" alt="">`;
  return `<div class="item-cover item-cover-loading" id="${coverId}" data-code="${esc(item.code)}" data-title="${esc(item.titel)}"></div>`;
}

function renderAddressBlock(item){
  const addr = state.addressLookup[item.rechNr];
  if (!addr) return `<div class="pack-address faint">Keine Adresse gefunden</div>`;
  const matchKey = addr.name ? customerMatchKey(addr.name, addr.plz) : null;
  const cust = matchKey ? findCustomerIndexByKey(matchKey) : null;
  const stars = cust ? starsDisplay(cust.purchaseCount) : '';
  return `
  <div class="pack-address">
    <div class="pack-address-name">${esc(addr.name)}${stars ? ` <span class="pack-address-stars" title="${cust.purchaseCount} Käufe">${stars}</span>` : ''}</div>
    ${addr.zuhaenden ? `<div>${esc(addr.zuhaenden)}</div>` : ''}
    <div>${esc(addr.strasse)}</div>
    <div>${esc(addr.plzOrt)}</div>
  </div>`;
}

function renderPackItemCard(zone, item){
  const status = state.status[zone] || {};
  const s = status[item.id] || {};
  const titleText = s.titleOverride || item.titel;
  const pState = packItemState(zone, item);

  if (pState.blocked){
    const coverHtml = staticCoverHtml(item, s.photo);
    const addrForWeight = state.addressLookup[item.rechNr];
    return `
    <div style="position:relative;">
      <div class="pack-block-badge">⚠</div>
      <div class="item pack-blocked" data-action="show-pack-block" data-zone="${zone}" data-id="${esc(item.id)}" data-reason="${esc(pState.reason)}">
        ${coverHtml}
        <div class="item-main">
          <div class="item-lf-inline">${esc(item.lagerfach)}</div>
          <div class="item-title">${esc(titleText)}${item.menge>1 ? `<span class="qty-badge">×${item.menge}</span>`:''}</div>
          <div class="pack-block-reason">⚠ ${esc(pState.reason)}</div>
          <div class="item-meta"><span>Bestellnr. ${esc(item.bestellnummer)} | Rech-Nr. ${esc(item.rechNr || '–')}</span></div>
          ${addrForWeight && addrForWeight.gewicht ? `<div class="item-meta"><span>Gewicht ${esc(addrForWeight.gewicht)}</span></div>` : ''}
        </div>
      </div>
    </div>`;
  }

  const isPacked = !!s.packed;
  const isProblem = !!s.packProblem;
  const isStorniert = !!s.storniert;
  const coverHtml = coverSlotHtml(zone, item, s.photo);
  const addr = state.addressLookup[item.rechNr];
  const related = !isPacked ? relatedOrderItems(zone, item) : [];
  const assignedSlot = item.rechNr ? state.stagingSlots[item.rechNr] : null;
  const relatedHtml = related.length ? `
    <div class="pack-related-hint">
      <span class="pack-related-title">📦 Noch ${related.length} weitere${related.length===1?'r':''} Artikel für diese Sendung${assignedSlot ? ` · 📍 Lagerplatz ${esc(assignedSlot)}` : ''}:</span>
      <span class="pack-related-list">
        ${related.map(r => `<span class="pack-related-badge ${r.picked ? '' : 'pack-related-badge-open'}">${esc(r.item.lagerfach)}${r.picked ? '' : ' · offen'}</span>`).join('')}
      </span>
    </div>` : '';
  const actionHtml = isStorniert
    ? `<button class="undo-btn" data-action="unstorno" data-zone="${zone}" data-id="${esc(item.id)}">Rückgängig</button>`
    : isPacked
    ? `<button class="undo-btn" data-action="unpack" data-zone="${zone}" data-id="${esc(item.id)}">Rückgängig</button>`
    : isProblem
    ? `
      <div class="pack-actions">
        <button class="pack-storno-btn" data-action="storno-item" data-zone="${zone}" data-id="${esc(item.id)}">🚫 Storno</button>
        <button class="pack-problem-btn pack-problem-btn-active" data-action="clear-problem" data-zone="${zone}" data-id="${esc(item.id)}">✕ Problem entfernen</button>
      </div>`
    : `
      <div class="pack-actions">
        <div class="pack-actions-row">
          <button class="pack-method-btn" data-action="pack" data-zone="${zone}" data-id="${esc(item.id)}" data-method="brief"><span class="pack-method-icon">✉️</span><span>Brief</span></button>
          <button class="pack-method-btn" data-action="pack" data-zone="${zone}" data-id="${esc(item.id)}" data-method="paket"><span class="pack-method-icon">📦</span><span>Paket</span></button>
        </div>
        <button class="pack-problem-btn" data-action="open-pack-problem" data-zone="${zone}" data-id="${esc(item.id)}">⚠ Problem</button>
      </div>`;
  return `
  <div class="item pack-card-column ${isPacked ? 'done' : ''}" style="${isProblem ? 'position:relative;' : ''}">
    ${isProblem ? `<div class="pack-problem-badge" data-action="open-pack-problem" data-zone="${zone}" data-id="${esc(item.id)}">⚠ ${esc(s.packProblem.reason || 'Problem gemeldet')}</div>` : ''}
    <div class="pack-item-row">
      <div class="pack-item-left">
        ${coverHtml}
        <div class="item-main">
          <div class="item-lf-inline">${esc(item.lagerfach)}</div>
          <div class="item-title">${esc(titleText)}${item.menge>1 ? `<span class="qty-badge">×${item.menge}</span>`:''}</div>
          <div class="item-meta"><span>Bestellnr. ${esc(item.bestellnummer)} | Rech-Nr. ${esc(item.rechNr || '–')}</span></div>
          ${addr && addr.gewicht ? `<div class="item-meta"><span>Gewicht ${esc(addr.gewicht)}</span></div>` : ''}
        </div>
      </div>
      <div class="pack-item-right">
        ${!isPacked ? renderAddressBlock(item) : ''}
        <div class="item-actions-col">
          ${actionHtml}
        </div>
      </div>
    </div>
    ${relatedHtml}
  </div>`;
}

function renderPacken(){
  const all = allPackItems();
  const packableEntries = all.filter(({zone, item}) => {
    const pState = packItemState(zone, item);
    if (pState.blocked) return false;
    const s = (state.status[zone] || {})[item.id];
    return !(s && s.storniert);
  });
  const total = packableEntries.length;
  const packedCount = packableEntries.filter(({zone, item}) => {
    const s = (state.status[zone] || {})[item.id];
    return !!(s && s.packed);
  }).length;
  const storniertCount = all.filter(({zone, item}) => {
    const s = (state.status[zone] || {})[item.id];
    return !!(s && s.storniert);
  }).length;
  const pct = total ? Math.round((packedCount/total)*100) : 0;
  const visible = all.filter(({zone, item}) => {
    const s = (state.status[zone] || {})[item.id];
    return !(s && (s.packed || s.storniert));
  });
  const list = visible.length
    ? visible.map(({zone, item}) => renderPackItemCard(zone, item)).join('')
    : `<div class="empty-state"><div class="big">🎉</div>Alles verpackt.</div>`;

  return `
  ${topbarHtml({
    title: 'Packen',
    sub: `${packedCount} / ${total} verpackt`,
    rightHtml: `<button class="iconbtn" data-action="go-gepackt">📬 Gepackt (${packedCount})</button><button class="iconbtn" data-action="go-storniert" title="Storniert">🚫 ${storniertCount}</button>${menuBtn()}`,
    progressPct: pct,
  })}
  <div class="content">
    <div class="stack">${list}</div>
  </div>`;
}

  const status = state.status[zone] || {};

  const coverHtml = coverSlotHtml(zone, item, s.photo);
  return `

    <div class="item-main">

      <div class="item-title">${esc(titleText)}${item.menge>1 ? `<span class="qty-badge">×${item.menge}</span>`:''}</div>

function renderKundenListScreen(){
  const search = (state.customerSearch || '').toLowerCase().trim();

      (c.ort || '').toLowerCase().includes(search) ||
      (c.plz || '').includes(search));

  const sort = state.customerSort || 'name';
  list.sort((a, b) => {
    if (sort === 'purchases') return (b.purchaseCount || 0) - (a.purchaseCount || 0);

function renderGepackt(){
  const all = allPackItems();
  const packedEntries = [];
  let storniertCount = 0;
  for (const {zone, item} of all){
    const s = (state.status[zone] || {})[item.id];
    if (s && s.packed) packedEntries.push({ zone, item, at: s.packed.at, method: s.packed.method });
    if (s && s.storniert) storniertCount++;
  }
  packedEntries.sort((a,b) => b.at - a.at);
  const filtered = state.gepacktFilter === 'all' ? packedEntries : packedEntries.filter(e => e.method === state.gepacktFilter);
  const list = filtered.length
    ? filtered.map(({zone, item}) => renderGepacktItemCard(zone, item)).join('')
    : `<div class="empty-state"><div class="big">📭</div>${packedEntries.length ? 'Nichts in dieser Ansicht.' : 'Noch nichts verpackt.'}</div>`;

  return `
  ${topbarHtml({title:'Gepackt', sub: `${filtered.length} / ${packedEntries.length} verpackt`, rightHtml: `<button class="iconbtn" data-action="go-storniert" title="Storniert">🚫 ${storniertCount}</button><button class="iconbtn" data-action="go-ship-archiv" title="Versand-Archiv">📋</button><button class="iconbtn" data-action="back-to-packen">← Packen</button>${menuBtn()}`})}

      <button class="tab-bubble ${state.gepacktFilter === 'all' ? 'tab-bubble-active' : ''}" data-action="set-gepackt-filter" data-filter="all">Alle</button>
      <button class="tab-bubble ${state.gepacktFilter === 'brief' ? 'tab-bubble-active' : ''}" data-action="set-gepackt-filter" data-filter="brief">✉️ Brief</button>
      <button class="tab-bubble ${state.gepacktFilter === 'paket' ? 'tab-bubble-active' : ''}" data-action="set-gepackt-filter" data-filter="paket">📦 Paket</button>

  </div>`;
}

function renderShipArchiv(){
  const method = state.archiveMethodFilter || 'brief';

  const entries = (state.shipArchive || []).filter(e => e.method === method);
  const groups = groupArchiveByDate(entries);
  const dateKeys = Object.keys(groups).sort((a,b) => groups[b][0].at - groups[a][0].at);

  const groupsHtml = dateKeys.length ? dateKeys.map(dateKey => {
    const dayEntries = groups[dateKey].slice().sort((a,b) => b.at - a.at);
    const rechNrList = dayEntries.map(e => esc(e.rechNr || '–')).join(', ');
    return `
    <div class="archive-day-card">
      <div class="archive-day-header">
        <span class="archive-day-date">📅 ${esc(dateKey)}</span>
        <span class="archive-day-count">${dayEntries.length} Sendungen</span>

      <div class="archive-day-rechnrs">${rechNrList}</div>
      <button class="btn btn-outline btn-sm" style="margin-top:8px;" data-action="download-archive-day" data-method="${method}" data-date="${esc(dateKey)}">⬇️ Diesen Tag herunterladen</button>
    </div>`;
  }).join('') : `<div class="empty-state"><div class="big">📭</div>Keine ${methodLabel}-Sendungen in den letzten 7 Tagen.</div>`;

  return `
  ${topbarHtml({title:'Versand-Archiv', sub: `${entries.length} Einträge · letzte 7 Tage`, rightHtml: `<button class="iconbtn" data-action="back-to-gepackt">← Gepackt</button>${menuBtn()}`})}

      <button class="tab-bubble ${method === 'brief' ? 'tab-bubble-active' : ''}" data-action="set-archive-method" data-method="brief">✉️ Brief</button>
      <button class="tab-bubble ${method === 'paket' ? 'tab-bubble-active' : ''}" data-action="set-archive-method" data-method="paket">📦 Paket</button>

    <div class="stack">${groupsHtml}</div>
  </div>`;
}

function renderOverview(){
  const rows = ZONE_ORDER.concat(['Sonstige']).filter(z => (state.items[z]||[]).length>0).map(z => {
    const def = ZONE_DEFS[z] || {label:'Sonstige', color:'var(--ink-soft)'};
    const st = zoneStats(z);
    const pct = st.total ? Math.round((st.done/st.total)*100) : 0;
    return `<div class="card" style="padding:14px; border-left:5px solid ${def.color};">
      <div class="zone-head"><div class="zone-name">${esc(def.label)}</div><div class="zone-count">${st.done}/${st.total}</div></div>
      <div class="zone-progress-track"><div class="zone-progress-fill" style="background:${def.color}; width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const nfItems = [];
  for (const z of ZONE_ORDER.concat(['Sonstige'])){
    const status = state.status[z] || {};
    for (const it of (state.items[z]||[])){
      if (status[it.id] && status[it.id].notFound) nfItems.push({...it, meta: status[it.id]});
    }
  }
  const nfHtml = nfItems.length
    ? nfItems.map(it => `<div class="item nf-list-item" style="padding:12px;">
        <div class="item-lf" style="background:var(--danger);">${esc(it.lagerfach)}</div>
        <div class="item-main">
          <div class="item-title">${esc(it.titel)}</div>
          <div class="item-meta"><span>Bestellnr. ${esc(it.bestellnummer)}</span><span>gemeldet von ${esc(it.meta.by)} · ${timeAgo(it.meta.at)}</span></div>
        </div>
      </div>`).join('')
    : `<div class="empty-state">Keine offenen "nicht gefunden"-Meldungen.</div>`;

  const damageItems = [];
  for (const z of ZONE_ORDER.concat(['Sonstige'])){
    const status = state.status[z] || {};
    for (const it of (state.items[z]||[])){
      if (status[it.id] && status[it.id].damage) damageItems.push({...it, meta: status[it.id]});
    }
  }
  const damageHtml = damageItems.length
    ? damageItems.map(it => `<div class="item nf-list-item" style="padding:12px; border-left-color:#C97A2E;">
        <div class="item-lf" style="background:#C97A2E;">${esc(it.lagerfach)}</div>
        <div class="item-main">
          <div class="item-title">${esc((it.meta.titleOverride) || it.titel)}</div>
          <div class="item-meta"><span>Bestellnr. ${esc(it.bestellnummer)}</span><span>${esc(it.meta.damage.reason)} · gemeldet von ${esc(it.meta.damage.by)} · ${timeAgo(it.meta.damage.at)}</span></div>
          ${it.meta.evidencePhoto ? `<img src="${esc(it.meta.evidencePhoto)}" class="evidence-preview" style="max-height:120px; margin-top:8px;" alt="Beleg-Foto">` : ''}
        </div>
      </div>`).join('')
    : `<div class="empty-state">Keine Schadensmeldungen.</div>`;

  return `
  ${topbarHtml({title:'Übersicht', rightHtml:`<button class="iconbtn" data-action="back-from-overview">← Zurück</button>`})}
  <div class="content stack">
    <div class="section-title">Fortschritt je Bereich</div>
    <div class="stack">${rows}</div>
    <div class="section-title">Nicht gefunden (Nacharbeit)</div>
    <div class="stack">${nfHtml}</div>
    <div class="section-title">Schadensmeldungen</div>
    <div class="stack">${damageHtml}</div>
    <div class="footernote">Pickliste-Tool · lokal geteilt über diesen Link</div>
  </div>`;
}

/* ============ Event binding ============ */
function bindDynamicHandlers(){
  const pickFilterSelect = document.getElementById('pick-filter-select');
  if (pickFilterSelect) pickFilterSelect.addEventListener('change', (e) => { state.pickFilter = e.target.value; render(); });
  document.querySelectorAll('input[type="file"][data-zone][data-id]').forEach(input => {
    input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const zone = input.dataset.zone, itemId = input.dataset.id;
      const kind = input.dataset.photoKind || 'cover';
      try{
        const dataUrl = await compressImageFile(file);
        if (kind === 'evidence') await setEvidencePhoto(zone, itemId, dataUrl);
        else if (kind === 'pack-problem') await setPackProblemPhoto(zone, itemId, dataUrl);
        else { await setCustomPhoto(zone, itemId, dataUrl); state.modal = null; }
      }catch(err){ console.error('Foto konnte nicht verarbeitet werden', err); }
      render();
    });
  });
  document.querySelectorAll('input.avatar-file-input[data-user]').forEach(input => {
    input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const username = input.dataset.user;
      try{
        const dataUrl = await compressImageFile(file);
        await setUserAvatar(username, dataUrl);
      }catch(err){ console.error('Nutzerfoto konnte nicht verarbeitet werden', err); }
      render();
    });
  });
  const newTicketPhotoInput = document.getElementById('new-ticket-photo-input');
  if (newTicketPhotoInput){
    newTicketPhotoInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try{
        state.newTicketPhoto = await compressImageFile(file);
      }catch(err){ console.error('Ticket-Foto konnte nicht verarbeitet werden', err); }
      render();
    });
  }
  const darkModeToggle = document.getElementById('dark-mode-toggle');
  if (darkModeToggle){
    darkModeToggle.addEventListener('change', (e) => {
      setLocalPref('theme', e.target.checked ? 'dark' : 'light');
      applyDisplayPrefs();
      render();
    });
  }
  const customerWarningToggle = document.getElementById('customer-warning-toggle');
  if (customerWarningToggle){
    customerWarningToggle.addEventListener('change', async (e) => {
      if (!state.currentCustomer) return;
      const cust = { ...state.currentCustomer };
      if (e.target.checked){
        cust.warning = { active: true, reason: (cust.warning && cust.warning.reason) || '', by: state.pickerName, at: Date.now() };
      } else {
        cust.warning = null;
      }
      await saveCustomer(cust);
      state.currentCustomer = cust;
      render();
    });
  }
  initCoverResolution();
}

document.getElementById('app').addEventListener('click', async (e) => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.dataset.action;
  if (action === 'menu-pick'){ state.screen = 'lobby'; render(); await loadAllZoneData(); render(); return; }
  if (action === 'menu-packen'){ state.screen = 'packen'; render(); await loadAllZoneData(); render(); startPackPolling(); return; }
  if (action === 'menu-statistik'){ state.screen = 'statistik'; render(); return; }
  if (action === 'menu-ticket'){ state.screen = 'tickets'; render(); await loadTickets(); render(); return; }
  if (action === 'menu-kunden'){ state.screen = 'kunden'; render(); return; }
  if (action === 'open-customer'){
    const cust = await getCustomer(t.dataset.id);
    state.currentCustomer = cust;
    state.screen = 'customer-detail';
    render();
    return;
  }
  if (action === 'back-to-kunden'){ state.screen = 'kunden'; state.currentCustomer = null; render(); return; }
  if (action === 'open-new-customer'){ state.screen = 'new-customer'; render(); return; }
  if (action === 'set-customer-sort'){ state.customerSort = t.dataset.sort; render(); return; }
  if (action === 'open-new-ticket'){ state.newTicketPhoto = null; state.modal = { type: 'new-ticket' }; render(); return; }
  if (action === 'go-ticket-archiv'){ state.screen = 'ticket-archiv'; render(); return; }
  if (action === 'back-to-tickets'){ state.screen = 'tickets'; render(); return; }
  if (action === 'ticket-done'){ await markTicketDone(t.dataset.id); return; }
  if (action === 'ticket-reopen'){ await reopenTicket(t.dataset.id); return; }
  if (action === 'set-stats-view'){ state.statsView = t.dataset.view; render(); return; }
  if (action === 'set-stats-range'){ state.statsRange = t.dataset.range; render(); return; }
  if (action === 'pack'){
    const z = t.dataset.zone, id = t.dataset.id, method = t.dataset.method;
    const it = (state.items[z]||[]).find(x => x.id === id);
    if (!it) return;
    const addr = state.addressLookup[it.rechNr];
    const weight = addr && addr.gewicht ? parseFloat(String(addr.gewicht).replace(',', '.')) : null;
    if (weight && !isNaN(weight)){
      if (method === 'brief' && weight > 500){
        state.modal = { type: 'weight-warning', zone: z, itemId: id, method, weight, kind: 'brief-heavy' };
        render();
        return;
      }
      if (method === 'paket' && weight > 1000){
        state.modal = { type: 'weight-warning', zone: z, itemId: id, method, weight, kind: 'paket-heavy' };
        render();
        return;
      }
    }
    await packItem(z, it, method);
    return;
  }
  if (action === 'confirm-weight-warning'){
    const z = t.dataset.zone, it = (state.items[z]||[]).find(x => x.id === t.dataset.id), method = t.dataset.method;
    state.modal = null;
    if (it) await packItem(z, it, method);
    else render();
    return;
  }
  if (action === 'unpack'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await unpackItem(z,it); return; }
  if (action === 'open-pack-problem'){ state.modal = { type: 'pack-problem', zone: t.dataset.zone, itemId: t.dataset.id }; render(); return; }
  if (action === 'set-pack-problem'){
    const z = t.dataset.zone, it = (state.items[z]||[]).find(x=>x.id===t.dataset.id);
    if (it) await markProblem(z, it, t.dataset.reason);
    state.modal = null;
    render();
    return;
  }
  if (action === 'clear-pack-problem-from-modal'){
    const z = t.dataset.zone, it = (state.items[z]||[]).find(x=>x.id===t.dataset.id);
    if (it) await clearProblem(z, it);
    state.modal = null;
    render();
    return;
  }
  if (action === 'manage-pack-problem-reasons'){ state.modal = { type: 'manage-pack-problem-reasons' }; render(); return; }
  if (action === 'remove-pack-problem-reason'){ await removePackProblemReason(t.dataset.reason); return; }
  if (action === 'clear-problem'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await clearProblem(z,it); return; }
  if (action === 'storno-item'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await stornoItem(z,it); return; }
  if (action === 'finalize-order-method'){
    const rechNr = t.dataset.rechnr, method = t.dataset.method;
    const currentSlot = state.modal && state.modal.slot;
    if (method === 'brief'){
      state.modal = { type: 'confirm-order-brief', slot: currentSlot, rechNr };
      render();
      return;
    }
    await finalizeOrderMethod(rechNr, method);
    state.modal = null;
    render();
    return;
  }
  if (action === 'back-to-order-complete'){ state.modal = { type: 'pack-order-complete', slot: t.dataset.slot, rechNr: t.dataset.rechnr }; render(); return; }
  if (action === 'confirm-order-brief'){
    await finalizeOrderMethod(t.dataset.rechnr, 'brief');
    state.modal = null;
    render();
    return;
  }
  if (action === 'unstorno'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await unstornoItem(z,it); return; }
  if (action === 'go-storniert'){ state.screen = 'storniert'; render(); return; }
  if (action === 'go-gepackt'){ state.screen = 'gepackt'; render(); return; }
  if (action === 'back-to-packen'){ state.screen = 'packen'; render(); return; }
  if (action === 'go-ship-archiv'){ state.screen = 'ship-archiv'; render(); return; }
  if (action === 'back-to-gepackt'){ state.screen = 'gepackt'; render(); return; }
  if (action === 'set-archive-method'){ state.archiveMethodFilter = t.dataset.method; render(); return; }
  if (action === 'set-gepackt-filter'){ state.gepacktFilter = t.dataset.filter; render(); return; }
  if (action === 'download-archive-day'){
    const method = t.dataset.method, dateKey = t.dataset.date;
    const entries = (state.shipArchive || []).filter(e => e.method === method && new Date(e.at).toLocaleDateString('de-DE') === dateKey);
    downloadArchiveEntries(entries, method + '_' + dateKey.replace(/\./g, '-'));
    return;
  }
  if (action === 'show-pack-block'){ state.modal = { type:'pack-block', zone: t.dataset.zone, itemId: t.dataset.id, reason: t.dataset.reason }; render(); return; }
  if (action === 'choose-user'){ chooseUser(t.dataset.user); return; }
  if (action === 'switch-user'){ stopPolling(); state.screen = 'user'; render(); return; }
  if (action === 'start-manage-users'){ state.managingUsers = true; render(); return; }
  if (action === 'stop-manage-users'){ state.managingUsers = false; render(); return; }
  if (action === 'remove-user'){ await removeUserName(t.dataset.user); return; }
  if (action === 'go-settings'){ state.previousScreen = state.screen; state.screen = 'settings-menu'; render(); return; }
  if (action === 'go-settings-detail'){ state.screen = 'settings'; render(); return; }
  if (action === 'logout'){ if (confirm('Wirklich abmelden?')) logout(); return; }
  if (action === 'go-menu'){ stopPolling(); state.screen = 'menu'; render(); return; }
  if (action === 'back-from-settings'){ state.screen = 'settings-menu'; render(); return; }
  if (action === 'back-from-settings-menu'){
    const target = state.previousScreen || (state.pickerName ? 'menu' : 'user');
    if (target === 'lobby') await loadAllZoneData();
    state.screen = target;
    render();
    return;
  }
  if (action === 'enter-zone'){ await enterZone(t.dataset.zone); return; }
  if (action === 'go-overview'){ state.screen = 'overview'; render(); return; }
  if (action === 'back-from-overview'){ if(!state.currentZone) await loadAllZoneData(); state.screen = state.currentZone ? 'picking' : 'lobby'; render(); return; }
  if (action === 'leave-zone'){ leaveZone(); return; }
  if (action === 'apply-update'){ await applyPendingUpdate(); return; }
  if (action === 'force-reimport'){ await forceReimportPicklist(); return; }
  if (action === 'go-settings-picklist'){ state.screen = 'settings-picklist'; render(); return; }
  if (action === 'go-settings-address'){ state.screen = 'settings-address'; render(); return; }
  if (action === 'go-settings-display'){ state.screen = 'settings-display'; render(); return; }
  if (action === 'go-settings-profil'){ state.screen = 'settings-profil'; render(); return; }
  if (action === 'set-textsize'){ setLocalPref('textsize', t.dataset.size); applyDisplayPrefs(); render(); return; }
  if (action === 'back-from-settings-sub'){ state.screen = 'settings'; render(); return; }
  if (action === 'mark-all-picked'){ await markAllItemsPicked(); return; }
  if (action === 'pick'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await markItem(z,it,false); return; }
  if (action === 'notfound'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await markItem(z,it,true); return; }
  if (action === 'undo'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await undoItem(z,it); return; }
  if (action === 'markhere'){ const z=t.dataset.zone, it=(state.items[z]||[]).find(x=>x.id===t.dataset.id); if(it) await markHere(z,it); return; }
  if (action === 'cancel-zone-entry'){ state.pendingZone = null; state.screen = state.currentZone ? 'picking' : 'lobby'; render(); return; }
  if (action === 'box-dec'){ state.zoneBoxCount = Math.max(1, state.zoneBoxCount - 1); render(); return; }
  if (action === 'box-inc'){ state.zoneBoxCount = state.zoneBoxCount + 1; render(); return; }
  if (action === 'claim-full'){ state.currentZone = state.pendingZone; state.pendingZone = null; state.screen = 'picking'; render(); startPolling(); return; }
  if (action === 'claim-partial'){
    const zone = state.pendingZone;
    const assignment = await claimBoxes(zone, state.pickerName, state.zoneBoxCount);
    state.assignment[zone] = assignment;
    state.currentZone = zone;
    state.pendingZone = null;
    state.screen = 'picking';
    render();
    startPolling();
    return;
  }
  if (action === 'request-more-boxes'){ stopPolling(); state.pendingZone = t.dataset.zone; state.zoneBoxCount = 1; state.screen = 'zone-entry'; render(); return; }
  if (action === 'release-assignment'){
    const zone = t.dataset.zone, picker = t.dataset.picker;
    if (!confirm(`Zuteilung von "${picker}" wirklich freigeben?`)) return;
    const assignment = await releaseAssignmentFor(zone, picker);
    state.assignment[zone] = assignment;
    render();
    return;
  }
  if (action === 'edit-title'){ state.modal = {type:'edit-title', zone: t.dataset.zone, itemId: t.dataset.id}; render(); return; }
  if (action === 'open-damage'){ state.modal = {type:'damage', zone: t.dataset.zone, itemId: t.dataset.id}; render(); return; }
  if (action === 'set-damage'){ await setDamage(t.dataset.zone, t.dataset.id, t.dataset.reason); render(); return; }
  if (action === 'clear-damage'){ await setDamage(t.dataset.zone, t.dataset.id, null); render(); return; }
  if (action === 'manage-damage-reasons'){ state.modal = {type:'manage-damage-reasons'}; render(); return; }
  if (action === 'remove-damage-reason'){ await removeDamageReason(t.dataset.reason); return; }
  if (action === 'noop'){ return; }
  if (action === 'close-modal' || action === 'close-modal-bg'){ state.modal = null; render(); return; }
});

document.getElementById('app').addEventListener('submit', async (e) => {
  const loginT = e.target.closest('[data-action="login-form"]');
  if (loginT){
    e.preventDefault();
    const u = document.getElementById('login-username');
    const p = document.getElementById('login-password');
    await submitLogin(u ? u.value : '', p ? p.value : '');
    return;
  }
  const jumpT = e.target.closest('[data-action="jump-form"]');
  if (jumpT){ e.preventDefault(); const input = document.getElementById('jump-input'); if (input) jumpTo(state.currentZone, input.value); return; }
  const addUserT = e.target.closest('[data-action="add-user-form"]');
  if (addUserT){ e.preventDefault(); const input = document.getElementById('new-user-input'); if (input && input.value.trim()){ await addUserName(input.value); input.value=''; } return; }
  const urlT = e.target.closest('[data-action="save-url-form"]');
  if (urlT){ e.preventDefault(); const input = document.getElementById('source-url-input'); if (input) await saveSourceUrl(input.value); return; }
  const addressUrlT = e.target.closest('[data-action="save-address-url-form"]');
  if (addressUrlT){
    e.preventDefault();
    const input = document.getElementById('address-url-input');
    if (input){
      state.addressSourceUrl = input.value.trim() || null;
      await storageSet('address-source-url', state.addressSourceUrl);
      if (state.addressSourceUrl) await fetchAndStoreAddressData();
      render();
    }
    return;
  }
  const titleT = e.target.closest('[data-action="save-title-form"]');
  if (titleT){
    e.preventDefault();
    const input = document.getElementById('edit-title-input');
    const {zone, itemId} = state.modal;
    if (input) await setTitleOverride(zone, itemId, input.value);
    state.modal = null;
    render();
    return;
  }
  const reasonT = e.target.closest('[data-action="add-damage-reason-form"]');
  if (reasonT){ e.preventDefault(); const input = document.getElementById('new-damage-reason-input'); if (input && input.value.trim()){ await addDamageReason(input.value); input.value=''; } return; }
  const packReasonT = e.target.closest('[data-action="add-pack-problem-reason-form"]');
  if (packReasonT){ e.preventDefault(); const input = document.getElementById('new-pack-problem-reason-input'); if (input && input.value.trim()){ await addPackProblemReason(input.value); input.value=''; } return; }
  const ticketT = e.target.closest('[data-action="create-ticket-form"]');
  if (ticketT){
    e.preventDefault();
    const textInput = document.getElementById('new-ticket-text');
    const text = textInput ? textInput.value.trim() : '';
    if (!text && !state.newTicketPhoto) return;
    await createTicket(text, state.newTicketPhoto);
    state.newTicketPhoto = null;
    state.modal = null;
    render();
    return;
  }
  const packProblemCustomT = e.target.closest('[data-action="set-pack-problem-custom-form"]');
  if (packProblemCustomT){
    e.preventDefault();
    const input = document.getElementById('pack-problem-custom-input');
    const val = input ? input.value.trim() : '';
    if (val && state.modal && state.modal.type === 'pack-problem'){
      const z = state.modal.zone, it = (state.items[z]||[]).find(x=>x.id===state.modal.itemId);
      if (it) await markProblem(z, it, val);
    }
    state.modal = null;
    render();
    return;
  }
  const custSearchT = e.target.closest('[data-action="customer-search-form"]');
  if (custSearchT){
    e.preventDefault();
    const input = document.getElementById('customer-search-input');
    state.customerSearch = input ? input.value : '';
    render();
    return;
  }
  const saveCustT = e.target.closest('[data-action="save-customer-form"]');
  if (saveCustT){
    e.preventDefault();
    if (state.currentCustomer){
      const cust = { ...state.currentCustomer };
      cust.name = (document.getElementById('cust-name-input')||{}).value || cust.name;
      cust.zuhaenden = (document.getElementById('cust-zuhaenden-input')||{}).value || '';
      cust.strasse = (document.getElementById('cust-strasse-input')||{}).value || '';
      cust.plz = (document.getElementById('cust-plz-input')||{}).value || '';
      cust.ort = (document.getElementById('cust-ort-input')||{}).value || '';
      cust.matchKey = customerMatchKey(cust.name, cust.plz);
      cust.updatedAt = Date.now();
      await saveCustomer(cust);
      state.currentCustomer = cust;
      render();
    }
    return;
  }
  const warnReasonT = e.target.closest('[data-action="save-warning-reason-form"]');
  if (warnReasonT){
    e.preventDefault();
    if (state.currentCustomer){
      const cust = { ...state.currentCustomer };
      const input = document.getElementById('warning-reason-input');
      cust.warning = { active: true, reason: input ? input.value.trim() : '', by: state.pickerName, at: Date.now() };
      await saveCustomer(cust);
      state.currentCustomer = cust;
      render();
    }
    return;
  }
  const newCustT = e.target.closest('[data-action="create-customer-form"]');
  if (newCustT){
    e.preventDefault();
    const name = (document.getElementById('new-cust-name-input')||{}).value || '';
    if (!name.trim()) return;
    const customer = await findOrCreateCustomer(
      name,
      (document.getElementById('new-cust-zuhaenden-input')||{}).value || '',
      (document.getElementById('new-cust-strasse-input')||{}).value || '',
      (document.getElementById('new-cust-plz-input')||{}).value || '',
      (document.getElementById('new-cust-ort-input')||{}).value || ''
    );
    state.currentCustomer = customer;
    state.screen = 'customer-detail';
    render();
    return;
  }
});
